<!DOCTYPE html>
<html>
<head>
    <title>Iris AR Viewer</title>

    <!-- Model Viewer -->
    <script type="module"
        src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>

    <style>
        body {
            margin: 0;
            text-align: center;
            font-family: Arial;
        }

        model-viewer {
            width: 100%;
            height: 90vh;
        }
    </style>
</head>
<body>

<h2>🌸 Iris AR Camera Viewer</h2>

<model-viewer 
    src="/static/models/Iris.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    poster="poster.webp"
    shadow-intensity="1"
    scale="0.289 0.333 0.500"
    style="width: 100%; height: 80vh; background-color: #eee;"
>
    <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
        👋 Activate AR Camera
    </button>

    <div id="ar-prompt">
        <img src="https://modelviewer.dev/shared-assets/icons/hand.png">
    </div>
</model-viewer>

<div style="padding: 20px;">
    <p><strong>X:</strong> Virginica | <strong>Y:</strong> Setosa | <strong>Z:</strong> Versicolor</p>
    <p><small>Note: Use a mobile device to see through the camera.</small></p>
</div>

</body>
</html>
