<!DOCTYPE html>
<html>
<head>
    <title>Laptop Webcam AR - Iris Explorer</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        .ar-ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .prediction-badge {
            background: rgba(79, 70, 229, 0.95);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 1.4rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .download-btn {
            background-color: #22c55e; /* Green */
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .download-btn:hover {
            background-color: #16a34a;
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .instruction-text {
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-family: sans-serif;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .back-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: white;
            color: #1e1b4b;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-family: sans-serif;
            font-weight: bold;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div class="ar-ui">
        <div class="prediction-badge">
            Target Species: {{ result }}
        </div>
        
        <div class="instruction-text">Point camera at the Hiro Marker</div>

        <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" 
           download="Hiro_Marker.png" 
           target="_blank"
           crossorigin="anonymous"
           class="download-btn">
            📥 Download Hiro Marker
        </a>
    </div>

    <a href="{% url 'home' %}" class="back-btn">← Back to Predictor</a>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <a-asset-item id="irisModel" src="/static/models/Iris.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity id="prism-wrapper"
                {% if result == "Setosa" %} rotation="0 0 0"
                {% elif result == "Virginica" %} rotation="0 90 0"
                {% elif result == "Versicolor" %} rotation="0 -90 0"
                {% endif %}>
                
                <a-entity 
                    gltf-model="#irisModel" 
                    scale="0.289 0.333 0.500" 
                    position="0 0 0">
                </a-entity>

                <a-text value="{{ result }}" position="0 1.2 0" align="center" color="#4F46E5" width="4"></a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
