<!DOCTYPE html>
<html>
<head>
    <title>Laptop Webcam AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        /* UI Overlay Styling */
        .ar-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .download-btn {
            background-color: rgba(33, 150, 243, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-family: sans-serif;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .download-btn:hover {
            background-color: #1976D2;
            transform: scale(1.05);
        }

        .instruction-text {
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-family: sans-serif;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div class="ar-ui">
        <div class="instruction-text">Point camera at the Hiro Marker</div>
        <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" 
           download="Hiro_Marker.png" 
           target="_blank"
           class="download-btn">
           📥 Download Hiro Marker
        </a>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <a-asset-item id="irisModel" src="/static/models/Iris.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity 
                gltf-model="#irisModel" 
                scale="0.289 0.333 0.500" 
                position="0 0 0" 
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
