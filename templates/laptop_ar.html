{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Laptop Webcam AR - Iris Explorer</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }

        /* Modern UI Overlay */
        .ar-ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center;
            gap: 12px; width: 100%; pointer-events: none;
        }
        .ar-ui > * { pointer-events: auto; }

        .prediction-badge {
            background: rgba(79, 70, 229, 0.95); color: white; padding: 12px 30px;
            border-radius: 50px; font-weight: bold; font-size: 1.4rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); border: 2px solid white;
        }

        /* Professional Control Buttons */
        .controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 10;
        }
        .controls button {
            padding: 12px 18px; border: none; border-radius: 12px;
            background: rgba(34, 34, 34, 0.9); color: white;
            font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .controls button:hover { background: #4f46e5; transform: scale(1.05); }

        .back-btn {
            position: absolute; top: 20px; left: 20px; background: white;
            color: #1e1b4b; text-decoration: none; padding: 10px 20px;
            border-radius: 10px; font-weight: bold; z-index: 20; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>

    <script>
        // PROFESSIONAL CONTROLS COMPONENT
        AFRAME.registerComponent('professional-controls', {
            schema: { initialY: {type: 'number', default: 0} },
            init: function () {
                let el = this.el;
                let dragging = false;
                let previousX = 0, previousY = 0;
                let velocityX = 0, velocityY = 0;
                let scale = 1;
                let lastDistance = null;
                let lastTap = 0;

                // Set initial rotation based on Django result
                this.rotation = { x: 0, y: this.data.initialY, z: 0 };
                el.setAttribute('rotation', this.rotation);

                // MOUSE / TOUCHPAD ROTATION
                window.addEventListener('mousedown', (e) => { dragging = true; previousX = e.screenX; previousY = e.screenY; });
                window.addEventListener('mouseup', () => { dragging = false; });
                window.addEventListener('mousemove', (e) => {
                    if (!dragging) return;
                    let deltaX = e.screenX - previousX;
                    let deltaY = e.screenY - previousY;
                    this.rotation.y += deltaX * 0.5;
                    this.rotation.x += deltaY * 0.5;
                    velocityX = deltaX; velocityY = deltaY;
                    el.setAttribute('rotation', this.rotation);
                    previousX = e.screenX; previousY = e.screenY;
                });

                // INERTIA (Smooth Drift)
                this.el.sceneEl.addEventListener('renderstart', () => {
                    setInterval(() => {
                        if (dragging) return;
                        velocityX *= 0.95; velocityY *= 0.95;
                        this.rotation.y += velocityX * 0.05;
                        this.rotation.x += velocityY * 0.05;
                        el.setAttribute('rotation', this.rotation);
                    }, 16);
                });

                // TOUCH GESTURES (Android)
                window.addEventListener('touchstart', (e) => {
                    let now = Date.now();
                    if (now - lastTap < 300) window.resetModel();
                    lastTap = now;
                    if (e.touches.length == 1) {
                        dragging = true;
                        previousX = e.touches[0].screenX;
                        previousY = e.touches[0].screenY;
                    }
                    if (e.touches.length == 2) {
                        let dx = e.touches[0].screenX - e.touches[1].screenX;
                        let dy = e.touches[0].screenY - e.touches[1].screenY;
                        lastDistance = Math.sqrt(dx * dx + dy * dy);
                    }
                });

                window.addEventListener('touchmove', (e) => {
                    if (e.touches.length == 1 && dragging) {
                        let deltaX = e.touches[0].screenX - previousX;
                        let deltaY = e.touches[0].screenY - previousY;
                        this.rotation.y += deltaX * 0.5;
                        this.rotation.x += deltaY * 0.5;
                        velocityX = deltaX; velocityY = deltaY;
                        el.setAttribute('rotation', this.rotation);
                        previousX = e.touches[0].screenX; previousY = e.touches[0].screenY;
                    }
                    if (e.touches.length == 2) { // Pinch Zoom
                        let dx = e.touches[0].screenX - e.touches[1].screenX;
                        let dy = e.touches[0].screenY - e.touches[1].screenY;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        if (lastDistance) {
                            let diff = distance - lastDistance;
                            scale += diff * 0.005;
                            scale = Math.max(0.1, Math.min(5, scale));
                            el.setAttribute('scale', `${scale} ${scale} ${scale}`);
                        }
                        lastDistance = distance;
                    }
                });

                window.addEventListener('touchend', () => { dragging = false; lastDistance = null; });

                // UI BUTTON FUNCTIONS
                window.zoomIn = () => { scale += 0.2; el.setAttribute('scale', `${scale} ${scale} ${scale}`); };
                window.zoomOut = () => { scale -= 0.2; scale = Math.max(0.1, scale); el.setAttribute('scale', `${scale} ${scale} ${scale}`); };
                window.rotateManual = (dir) => { this.rotation.y += dir; el.setAttribute('rotation', this.rotation); };
                window.resetModel = () => {
                    this.rotation = { x: 0, y: this.data.initialY, z: 0 };
                    scale = 1;
                    el.setAttribute('rotation', this.rotation);
                    el.setAttribute('scale', "1 1 1");
                };
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">

    <a href="{% url 'home' %}" class="back-btn">← Home</a>

    <div class="ar-ui">
        <div class="prediction-badge">Species: {{ result }}</div>
        <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" 
           download="Hiro_Marker.png" class="instruction-text" 
           style="color: white; text-decoration: underline;">Download Hiro Marker</a>
    </div>

    <div class="controls">
        <button onclick="rotateManual(-30)">⟲ Rotate</button>
        <button onclick="rotateManual(30)">⟳ Rotate</button>
        <button onclick="zoomIn()">＋ Zoom</button>
        <button onclick="zoomOut()">－ Zoom</button>
        <button onclick="resetModel()">Reset</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <a-asset-item id="irisModel" src="/static/models/Iris.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity light="type: ambient; intensity: 0.8"></a-entity>
            <a-entity light="type: directional; intensity: 1" position="2 4 3"></a-entity>

            <a-plane rotation="-90 0 0" width="2" height="2" color="#fff" opacity="0.2"></a-plane>

            <a-entity id="prism-wrapper"
                professional-controls="initialY: {% if result == 'Setosa' %}0{% elif result == 'Virginica' %}90{% elif result == 'Versicolor' %}-90{% else %}0{% endif %}"
                position="0 0 0">
                
                <a-entity 
                    gltf-model="#irisModel" 
                    scale="0.289 0.333 0.500" 
                    position="0 0 0">
                </a-entity>

                <a-text value="{{ result }}" position="0 1.2 0" align="center" color="#4F46E5" width="4"></a-text>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
